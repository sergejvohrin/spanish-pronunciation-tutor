name: Deploy Supabase

on:
  push:
    branches: ["main"]
    paths:
      - "supabase/**"
      - ".github/workflows/deploy-supabase.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
      HF_TTS_MODEL: ${{ vars.HF_TTS_MODEL }}
      HF_VIDEO_MODEL: ${{ vars.HF_VIDEO_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Validate configuration
        run: |
          set -euo pipefail
          [ -n "${SUPABASE_ACCESS_TOKEN:-}" ] || { echo "Missing SUPABASE_ACCESS_TOKEN secret" >&2; exit 1; }
          [ -n "${PROJECT_REF:-}" ] || { echo "Missing SUPABASE_PROJECT_REF repository variable" >&2; exit 1; }
          [ -n "${HF_API_TOKEN:-}" ] || { echo "Missing HF_API_TOKEN secret" >&2; exit 1; }

      - name: Apply database migrations
        run: |
          set -euo pipefail
          npx supabase@latest link --project-ref "$PROJECT_REF" --yes
          if [ -n "${SUPABASE_DB_PASSWORD:-}" ]; then
            npx supabase@latest db push --linked --password "$SUPABASE_DB_PASSWORD" --yes
          else
            npx supabase@latest db push --linked --yes
          fi

      - name: Set Supabase secrets
        run: |
          set -euo pipefail
          SECRET_ARGS=(HF_API_TOKEN="$HF_API_TOKEN")
          if [ -n "${HF_TTS_MODEL:-}" ]; then
            SECRET_ARGS+=(HF_TTS_MODEL="$HF_TTS_MODEL")
          fi
          if [ -n "${HF_VIDEO_MODEL:-}" ]; then
            SECRET_ARGS+=(HF_VIDEO_MODEL="$HF_VIDEO_MODEL")
          fi
          npx supabase@latest secrets set "${SECRET_ARGS[@]}" --project-ref "$PROJECT_REF"

      - name: Deploy edge functions
        run: |
          set -euo pipefail
          npx supabase@latest functions deploy hf-tts --no-verify-jwt --project-ref "$PROJECT_REF"
          npx supabase@latest functions deploy hf-video --no-verify-jwt --project-ref "$PROJECT_REF"
