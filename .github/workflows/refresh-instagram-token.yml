name: Refresh Instagram Token

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Refresh long-lived token from Supabase secret source
        id: refresh
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          TOKEN_ROTATION_SECRET: ${{ secrets.TOKEN_ROTATION_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${VITE_SUPABASE_URL:-}" ] || [ -z "${VITE_SUPABASE_PUBLISHABLE_KEY:-}" ]; then
            echo "Missing VITE_SUPABASE_URL or VITE_SUPABASE_PUBLISHABLE_KEY" >&2
            exit 1
          fi

          if [ -z "${TOKEN_ROTATION_SECRET:-}" ]; then
            echo "Missing TOKEN_ROTATION_SECRET secret" >&2
            exit 1
          fi

          RESPONSE=$(curl -sS -X POST "${VITE_SUPABASE_URL}/functions/v1/refresh-instagram-token" \
            -H "Content-Type: application/json" \
            -H "apikey: ${VITE_SUPABASE_PUBLISHABLE_KEY}" \
            -H "Authorization: Bearer ${VITE_SUPABASE_PUBLISHABLE_KEY}" \
            -H "x-rotation-secret: ${TOKEN_ROTATION_SECRET}" \
            -d '{}')

          NEW_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token // empty')
          EXPIRES_IN=$(echo "$RESPONSE" | jq -r '.expires_in // empty')

          if [ -z "$NEW_TOKEN" ]; then
            echo "Refresh failed: $RESPONSE" >&2
            exit 1
          fi

          {
            echo "new_token=$NEW_TOKEN"
            echo "expires_in=$EXPIRES_IN"
          } >> "$GITHUB_OUTPUT"

          echo "::add-mask::$NEW_TOKEN"

      - name: Update Supabase secret
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          NEW_TOKEN: ${{ steps.refresh.outputs.new_token }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN secret" >&2
            exit 1
          fi

          if [ -z "${PROJECT_REF:-}" ]; then
            echo "Missing SUPABASE_PROJECT_REF repository variable" >&2
            exit 1
          fi

          npx supabase secrets set INSTAGRAM_ACCESS_TOKEN="$NEW_TOKEN" --project-ref "$PROJECT_REF"

      - name: Summary
        env:
          EXPIRES_IN: ${{ steps.refresh.outputs.expires_in }}
        run: |
          echo "Instagram token refreshed from Supabase secret source. expires_in=${EXPIRES_IN}s" >> "$GITHUB_STEP_SUMMARY"
