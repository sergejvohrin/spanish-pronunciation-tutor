name: Supabase Health Check

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  cadence_gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
      reason: ${{ steps.gate.outputs.reason }}
      elapsed_hours: ${{ steps.gate.outputs.elapsed_hours }}
      next_run_utc: ${{ steps.gate.outputs.next_run_utc }}
    steps:
      - name: Compute cadence gate
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const workflowPath = '.github/workflows/supabase-health-check.yml';
            const { owner, repo } = context.repo;
            const thresholdHours = 120;

            const result = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: workflowPath,
              status: 'completed',
              per_page: 100,
            });

            const runs = result.data.workflow_runs || [];
            const successes = runs
              .filter((run) => run.conclusion === 'success' && run.id !== context.runId)
              .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));

            let shouldRun = 'true';
            let reason = 'first_run';
            let elapsedHours = '';
            let nextRunUtc = '';

            if (successes.length > 0) {
              const last = successes[0];
              const lastTs = new Date(last.updated_at).getTime();
              const elapsed = (Date.now() - lastTs) / (1000 * 60 * 60);
              elapsedHours = elapsed.toFixed(2);

              if (elapsed >= thresholdHours) {
                shouldRun = 'true';
                reason = 'elapsed>=120h';
              } else {
                shouldRun = 'false';
                reason = 'elapsed<120h';
                nextRunUtc = new Date(lastTs + thresholdHours * 60 * 60 * 1000).toISOString();
              }
            }

            core.setOutput('should_run', shouldRun);
            core.setOutput('reason', reason);
            core.setOutput('elapsed_hours', elapsedHours);
            core.setOutput('next_run_utc', nextRunUtc);

            await core.summary
              .addHeading('Cadence Gate')
              .addRaw(`should_run: ${shouldRun}\n`)
              .addRaw(`reason: ${reason}\n`)
              .addRaw(`elapsed_hours: ${elapsedHours || 'n/a'}\n`)
              .addRaw(`next_run_utc: ${nextRunUtc || 'n/a'}\n`)
              .write();

  health_check:
    runs-on: ubuntu-latest
    needs: cadence_gate
    if: needs.cadence_gate.outputs.should_run == 'true'
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
      TOKEN_ROTATION_SECRET: ${{ secrets.TOKEN_ROTATION_SECRET }}
    steps:
      - name: Validate required variables
        run: |
          set -euo pipefail
          [ -n "${VITE_SUPABASE_URL:-}" ] || { echo "Missing VITE_SUPABASE_URL" >&2; exit 1; }
          [ -n "${VITE_SUPABASE_PUBLISHABLE_KEY:-}" ] || { echo "Missing VITE_SUPABASE_PUBLISHABLE_KEY" >&2; exit 1; }
          [ -n "${TOKEN_ROTATION_SECRET:-}" ] || { echo "Missing TOKEN_ROTATION_SECRET" >&2; exit 1; }

      - name: Run Supabase health suite
        id: checks
        run: |
          set -euo pipefail

          mark_ok() {
            echo "$1=PASS" >> "$GITHUB_OUTPUT"
          }

          echo "started_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "cadence_reason=${{ needs.cadence_gate.outputs.reason }}" >> "$GITHUB_OUTPUT"
          echo "elapsed_hours=${{ needs.cadence_gate.outputs.elapsed_hours }}" >> "$GITHUB_OUTPUT"

          POST_LOGS_JSON=$(curl -sS --retry 3 --retry-delay 2 --retry-all-errors "${VITE_SUPABASE_URL}/rest/v1/post_logs?select=id,created_at,status&order=id.desc&limit=1" \
            -H "apikey: ${VITE_SUPABASE_PUBLISHABLE_KEY}" \
            -H "Authorization: Bearer ${VITE_SUPABASE_PUBLISHABLE_KEY}")
          echo "post_logs_preview=$(echo "$POST_LOGS_JSON" | jq -c '.[0] // {}')" >> "$GITHUB_OUTPUT"
          echo "$POST_LOGS_JSON" | jq -e 'type == "array"' >/dev/null
          mark_ok post_logs_status

          BACKEND_HEALTH_JSON=$(curl -sS --connect-timeout 30 --max-time 180 \
            -X POST "${VITE_SUPABASE_URL}/functions/v1/backend-health" \
            -H "Content-Type: application/json" \
            -H "apikey: ${VITE_SUPABASE_PUBLISHABLE_KEY}" \
            -H "x-pipeline-secret: ${TOKEN_ROTATION_SECRET}" \
            -d '{}')
          echo "$BACKEND_HEALTH_JSON" | jq -e '.ok == true' >/dev/null
          echo "$BACKEND_HEALTH_JSON" | jq -e '.translation.english.word | type == "string" and length > 0' >/dev/null
          mark_ok hf_translation_status
          mark_ok hf_image_status
          mark_ok media_pipeline_save_status

          IMGBB_URL=$(echo "$BACKEND_HEALTH_JSON" | jq -r '.imageUrl // empty')
          [ -n "$IMGBB_URL" ] || { echo "media-pipeline save returned empty imageUrl" >&2; exit 1; }
          echo "backend_post_logs_preview=$(echo "$BACKEND_HEALTH_JSON" | jq -c '.postLogsPreview // {}')" >> "$GITHUB_OUTPUT"

          echo "imgbb_url=$IMGBB_URL" >> "$GITHUB_OUTPUT"
          echo "finished_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Write summary
        run: |
          {
            echo "## Supabase Health Check"
            echo ""
            echo "- cadence reason: ${{ steps.checks.outputs.cadence_reason }}"
            echo "- elapsed hours since last success: ${{ steps.checks.outputs.elapsed_hours }}"
            echo "- started: ${{ steps.checks.outputs.started_at_utc }}"
            echo "- finished: ${{ steps.checks.outputs.finished_at_utc }}"
            echo ""
            echo "### Endpoint Matrix"
            echo "- post_logs: ${{ steps.checks.outputs.post_logs_status }}"
            echo "- hf-translation: ${{ steps.checks.outputs.hf_translation_status }}"
            echo "- hf-image: ${{ steps.checks.outputs.hf_image_status }}"
            echo "- media-pipeline(save): ${{ steps.checks.outputs.media_pipeline_save_status }}"
            echo ""
            echo "### Artifacts"
            echo "- ImgBB URL: ${{ steps.checks.outputs.imgbb_url }}"
            echo "- post_logs preview: ${{ steps.checks.outputs.post_logs_preview }}"
            echo "- backend post_logs preview: ${{ steps.checks.outputs.backend_post_logs_preview }}"
          } >> "$GITHUB_STEP_SUMMARY"

  skip_notice:
    runs-on: ubuntu-latest
    needs: cadence_gate
    if: needs.cadence_gate.outputs.should_run != 'true'
    steps:
      - name: Write skip summary
        run: |
          {
            echo "## Supabase Health Check Skipped"
            echo ""
            echo "- reason: ${{ needs.cadence_gate.outputs.reason }}"
            echo "- elapsed hours since last success: ${{ needs.cadence_gate.outputs.elapsed_hours }}"
            echo "- next eligible run (UTC): ${{ needs.cadence_gate.outputs.next_run_utc }}"
          } >> "$GITHUB_STEP_SUMMARY"
